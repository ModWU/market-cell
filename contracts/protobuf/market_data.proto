syntax = "proto3";

package market_cell.market_data.v1;

message Instrument {
  string source_provider = 1;
  string exchange = 2;
  string symbol = 3;
  MarketType market_type = 4;
}

enum MarketType {
  MARKET_TYPE_UNSPECIFIED = 0;
  MARKET_TYPE_SPOT = 1;
  MARKET_TYPE_PERPETUAL_FUTURE = 2;
  MARKET_TYPE_FUTURES = 3;
  MARKET_TYPE_INDEX = 4;
}

message MarketDataEvent {
  string event_id = 1;
  int64 event_time_ms = 2;
  Instrument instrument = 3;

  oneof payload {
    TradeTick trade_tick = 10;
    CandleClosed candle_closed = 11;
    SourceStatus source_status = 12;
    DataQualityWarning data_quality_warning = 13;
  }
}

message TradeTick {
  int64 trade_time_ms = 1;
  string trade_id = 2;
  double price = 3;
  double quantity = 4;
  TradeSide side = 5;
}

enum TradeSide {
  TRADE_SIDE_UNSPECIFIED = 0;
  TRADE_SIDE_BUY = 1;
  TRADE_SIDE_SELL = 2;
}

message CandleClosed {
  string interval = 1;
  int64 open_time_ms = 2;
  int64 close_time_ms = 3;
  double open = 4;
  double high = 5;
  double low = 6;
  double close = 7;
  double volume = 8;
  uint64 trade_count = 9;
  double quote_volume = 10;
  repeated string quality_flags = 11;
}

message SourceStatus {
  SourceState state = 1;
  int64 observed_at_ms = 2;
  uint64 latency_ms = 3;
  string message = 4;
}

enum SourceState {
  SOURCE_STATE_UNSPECIFIED = 0;
  SOURCE_STATE_CONNECTING = 1;
  SOURCE_STATE_HEALTHY = 2;
  SOURCE_STATE_DEGRADED = 3;
  SOURCE_STATE_STALE = 4;
  SOURCE_STATE_DOWN = 5;
}

message DataQualityWarning {
  string code = 1;
  string message = 2;
  string severity = 3;
  int64 observed_at_ms = 4;
}
