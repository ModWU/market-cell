[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "market-cell"
version = "0.1.0"
description = "A cell-level factor analysis engine for global market intelligence."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
market-cell = "market_cell.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
